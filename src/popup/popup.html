<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DataLemur Sync</title>
    <link rel="stylesheet" href="../styles/theme.css" />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="brand">
          <img src="../../assets/icons/icon32.png" alt="" width="20" height="20" />
          <h1>DataLemur Sync</h1>
        </div>
        <span id="status" class="status" data-tone="muted">Loading…</span>
      </header>

      <section class="card">
        <div class="row">
          <span class="label">Problem</span>
          <span class="value" id="problem-title">—</span>
        </div>
        <div class="row">
          <span class="label">Difficulty</span>
          <span class="pill" id="problem-difficulty">—</span>
        </div>
        <div class="row">
          <span class="label">Repository</span>
          <span class="value" id="repo">Not configured</span>
        </div>
        <div class="row">
          <span class="label">Path</span>
          <span class="value" id="target-path">—</span>
        </div>
      </section>

      <div class="actions">
        <button id="sync" class="primary" disabled>Sync</button>
        <button id="preview" disabled>Preview</button>
        <button id="settings">Settings</button>
      </div>

      <section id="preview-panel" class="card hidden">
        <pre id="preview-body"></pre>
      </section>

      <section class="card stats">
        <h2 class="label">Progress</h2>
        <div class="stat-grid">
          <div class="stat"><span id="stat-total">0</span><small>Total</small></div>
          <div class="stat"><span id="stat-easy" class="easy">0</span><small>Easy</small></div>
          <div class="stat"><span id="stat-medium" class="medium">0</span><small>Medium</small></div>
          <div class="stat"><span id="stat-hard" class="hard">0</span><small>Hard</small></div>
        </div>
        <div class="row">
          <span class="label">Last sync</span>
          <span class="value" id="last-sync">Never</span>
        </div>
      </section>
    </main>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
